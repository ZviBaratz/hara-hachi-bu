name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libglib2.0-dev-bin gettext

            - name: Compile schemas (strict)
              run: glib-compile-schemas --strict schemas/

            - name: Build package
              run: ./package.sh

            - name: Verify package contents
              run: |
                  unzip -t hara-hachi-bu@ZviBaratz.zip
                  echo "--- Package contents ---"
                  unzip -l hara-hachi-bu@ZviBaratz.zip

            - name: Check translation template is up-to-date
              run: |
                  make pot
                  if ! git diff --quiet hara-hachi-bu.pot; then
                    echo "::warning::Translation template (hara-hachi-bu.pot) is out of date. Run 'make pot' to regenerate."
                  fi

            - name: Upload build artifact
              uses: actions/upload-artifact@v6
              with:
                  name: hara-hachi-bu-${{ github.sha }}
                  path: hara-hachi-bu@ZviBaratz.zip
                  retention-days: 30
